<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Code Masters</title>
    <link rel="shortcut icon" th:href="@{/img/favicon/favicon.png}" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="container">
    <div class="welcome-section">
        <h1>BEM-VINDO!</h1>
        <p>
            A Code Masters dá os parabéns por chegar aqui. Sinal que tem vontade de se tornar um desenvolvedor.
            Já tem uma conta? Faça login, caso ainda não tenha uma conta cadastre-se.
        </p>
        <a th:href="@{/auth/register}">
            <button class="learn-more">Fazer cadastro</button>
        </a>
    </div>

    <div class="login-section">
        <a th:href="@{/}">
            <img th:src="@{/img/logo.png}" alt="Home">
        </a>
        <form method="post" th:action="@{/auth/login}">
            <small class="error-label" th:if="${param.get('error')!=null}" th:text="${msg}"></small>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Digite o seu email"
                   aria-label="Digite o seu email" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Digite a sua palavra passe"
                   aria-label="Digite a sua palavra passe" required>
            <br>

            <button type="submit" class="submit">Entrar</button>

            <div class="social-icons">
                <a href="#">
                    <img th:src="@{/img/login/facebook.png}" alt="Facebook" title="Entrar com o Facebook">
                </a>
                <a href="#">
                    <img th:src="@{/img/login/instagram.png}" alt="Instagram" title="Entrar com o Instagram">
                </a>
                <a href="#">
                    <img th:src="@{/img/login/google.png}" alt="Google" title="Entrar com uma conta Google">
                </a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
